name: example
description: Demo app for iconify_full.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  iconify_full:
    path: ..
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

iconify_full:
  cache: ../../.iconify_cache
  assets_dir: assets/iconify
  manifest: lib/generated/iconify_manifest.g.dart

flutter:
  uses-material-design: true
  assets:
# >>> iconify_full assets
    - assets/iconify/mdi/home.svg
    - assets/iconify/mdi/heart.svg
    - assets/iconify/tabler/brand-flutter.svg
    - assets/iconify/solar/star-bold.svg
    - assets/iconify/solar/accumulator-bold.svg
# <<< iconify_full assets
