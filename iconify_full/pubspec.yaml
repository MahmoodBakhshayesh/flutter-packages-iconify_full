name: iconify_full
description: >
  Offline Iconify icons for Flutter — themed SVG widgets, local cache of 200+
  open icon sets, and automatic build-time subsetting so apps only bundle
  icons they use.
version: 0.1.8
homepage: https://github.com/MahmoodBakhshayesh/flutter-packages-iconify_full
repository: https://github.com/MahmoodBakhshayesh/flutter-packages-iconify_full
issue_tracker: https://github.com/MahmoodBakhshayesh/flutter-packages-iconify_full/issues
documentation: https://github.com/MahmoodBakhshayesh/flutter-packages-iconify_full/iconify_full#readme

topics:
  - icon
  - icons
  - svg
  - iconify
  - ui

environment:
  sdk: ^3.12.0
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  flutter_svg: ^2.2.0
  http: ^1.4.0
  path: ^1.9.1
  path_provider: ^2.1.5
  yaml: ^3.1.3
  args: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

executables:
  iconify_init:
  iconify_download:
  iconify_codegen:
  iconify_subset:
  iconify_apply_hooks:
  iconify_build:

flutter:
  plugin:
    platforms:
      android:
        package: dev.iconify.full
        pluginClass: IconifyFullPlugin
      ios:
        pluginClass: IconifyFullPlugin
      linux:
        dartPluginClass: IconifyFullPlugin
      macos:
        dartPluginClass: IconifyFullPlugin
      windows:
        dartPluginClass: IconifyFullPlugin
      web:
        pluginClass: IconifyFullPluginWeb
        fileName: iconify_full_web.dart
