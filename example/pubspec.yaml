name: example
description: Demo app for iconify_full.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

iconify_full:
  cache: ../.iconify_cache

dependencies:
  flutter:
    sdk: flutter
  iconify_full:
    path: ../iconify_full
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/iconify/
